openapi: 3.0.3
info:
  title: Employee Task Management API
  version: 1.0.0
  description: Complete manual API documentation for the Employee Task Management platform workspace.
servers:
  - url: http://127.0.0.1:8000/api
paths:
  /register/:
    post:
      summary: Register a new system user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password, role]
              properties:
                username: { type: string }
                email: { type: string, format: email }
                password: { type: string }
                role: { type: string, enum: [admin, employee] }
      responses:
        '201':
          description: User registered successfully
  /tasks/:
    get:
      summary: Get all tasks (Filtered by user role context)
      responses:
        '200':
          description: Success
    post:
      summary: Create a new task (Admin/Manager only)
      responses:
        '201':
          description: Task created successfully
  /employees/:
    get:
      summary: List all employee-level accounts
      responses:
        '200':
          description: Success
  /audit-logs/:
    get:
      summary: View system configuration audit tracking logs
      responses:
        '200':
          description: Success